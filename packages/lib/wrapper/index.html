<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{TITLE}}</title>

    <link rel="stylesheet" href="./index.css" />

    <script src="./index.js"></script>
  </head>
  <body>
    <main>
      <h1>{{TITLE}}</h1>
      <p>{{MESSAGE}}</p>
      <form>
        <input
          type="password"
          placeholder="Enter password"
          autocomplete="current-password"
        />
        <button type="submit">Go</button>
      </form>
    </main>

    <!-- There should only be one aside tag, and it should only contain attribution. See wrapper.ts -->
    <aside>
      <p>
        Powered by
        <a href="https://github.com/lafkpages/swcrypts" target="_blank">
          SwCrypts
        </a>
      </p>
    </aside>
  </body>
</html>
