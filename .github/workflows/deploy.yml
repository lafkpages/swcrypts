name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "packages/lib/**"
      - "packages/cli/**"
      - "example/**"
      - ".github/workflows/deploy.yml"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deploy at a time; cancel any in-progress run if a new one starts
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build wrapper
        run: bun run --cwd packages/lib build

      - name: Build CLI
        run: bun run --cwd packages/cli build

      - name: Encrypt example site with demo password
        env:
          SWCRYPTS_PASSWORD: Hi
        run: bun run --cwd packages/cli . build -i ../../example -o ../../example-enc

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: example-enc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
